<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMK 2021 Manifesto Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C0392B;
    --black: #111111;
    --gold: #D4A017;
    --done: #1A7A4C;
    --done-bg: #E8F5EE;
    --pend: #B8460B;
    --pend-bg: #FEF0E8;
    --cream: #FAF7F2;
    --border: #E5DDD0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--black);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--black);
    color: white;
    padding: 40px 24px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--red) 50%, var(--gold) 50%);
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    font-weight: 900;
    letter-spacing: -0.5px;
    line-height: 1.15;
  }
  header h1 span { color: var(--gold); }
  header p {
    margin-top: 10px;
    font-size: 0.95rem;
    color: #AAA;
    font-weight: 300;
  }

  /* STATS BAR */
  .stats {
    display: flex;
    justify-content: center;
    gap: 0;
    flex-wrap: wrap;
    background: white;
    border-bottom: 2px solid var(--border);
    padding: 0;
  }
  .stat-block {
    flex: 1 1 120px;
    padding: 18px 16px;
    text-align: center;
    border-right: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.2s;
  }
  .stat-block:last-child { border-right: none; }
  .stat-block:hover, .stat-block.active { background: #F5F0E8; }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.9rem;
    font-weight: 700;
    line-height: 1;
  }
  .stat-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #666;
    margin-top: 4px;
    font-weight: 500;
  }
  .s-all .stat-num { color: var(--black); }
  .s-done .stat-num { color: var(--done); }
  .s-inc .stat-num { color: var(--pend); }

  /* PROGRESS BAR */
  .progress-wrap {
    background: white;
    padding: 12px 24px;
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .progress-bar {
    flex: 1;
    height: 10px;
    background: #EEE;
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--done), #2ECC71);
    border-radius: 99px;
    transition: width 0.8s ease;
  }
  .progress-label {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--done);
    white-space: nowrap;
  }

  /* CONTROLS */
  .controls {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 20px 8px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-box {
    flex: 1 1 260px;
    padding: 10px 16px;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    background: white;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--red); }
  .filter-btn {
    padding: 10px 18px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: #999; }
  .filter-btn.active-all { background: var(--black); color: white; border-color: var(--black); }
  .filter-btn.active-done { background: var(--done); color: white; border-color: var(--done); }
  .filter-btn.active-inc { background: var(--pend); color: white; border-color: var(--pend); }

  .results-count {
    font-size: 0.82rem;
    color: #888;
    padding: 0 20px 12px;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* SECTIONS */
  .sections {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  .section-group {
    margin-bottom: 32px;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--black);
    padding: 10px 0 10px;
    border-bottom: 2px solid var(--black);
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .section-title .sec-counts {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    color: #888;
  }

  /* PROMISE GRID */
  .promises-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 10px;
  }

  .promise-card {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
  }
  .promise-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    border-radius: 10px 0 0 10px;
  }
  .promise-card.done::before { background: var(--done); }
  .promise-card.incomplete::before { background: var(--pend); }
  .promise-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.08); }

  .promise-num {
    font-family: 'Playfair Display', serif;
    font-size: 0.78rem;
    font-weight: 700;
    color: #BBB;
    min-width: 28px;
    margin-top: 1px;
  }
  .promise-text {
    flex: 1;
    font-size: 0.85rem;
    line-height: 1.5;
    color: #333;
    font-weight: 400;
  }
  .promise-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 3px 8px;
    border-radius: 99px;
    white-space: nowrap;
    margin-top: 2px;
    flex-shrink: 0;
  }
  .badge-done { background: var(--done-bg); color: var(--done); }
  .badge-inc { background: var(--pend-bg); color: var(--pend); }

  .hidden { display: none !important; }

  footer {
    text-align: center;
    padding: 20px;
    font-size: 0.78rem;
    color: #AAA;
    border-top: 1px solid var(--border);
    background: white;
  }
  footer span { color: var(--red); }

  @media (max-width: 600px) {
    .promises-grid { grid-template-columns: 1fr; }
    .stat-block { flex: 1 1 80px; padding: 12px 8px; }
    .stat-num { font-size: 1.4rem; }
    .controls { flex-direction: column; }
    .search-box { width: 100%; }
  }
</style>
</head>

<div class="results-count" id="results-count"></div>

<div class="sections" id="sections-container"></div>

<footer>Data compiled from DMK 2021 Manifesto &amp; independent trackers · <span>Partial fulfillment counted as Incomplete</span></footer>

// ── BUILD DOM ─────────────────────────────────────────────────────────────────
let currentFilter = 'all';
let currentSearch = '';

function buildPage() {
  const container = document.getElementById('sections-container');
  container.innerHTML = '';

  let totalDone = 0, totalInc = 0, total = 0;

  sections.forEach(sec => {
    sec.promises.forEach(p => {
      total++;
      if (p[2]) totalDone++; else totalInc++;
    });
  });

  document.getElementById('cnt-all').textContent = total;
  document.getElementById('cnt-done').textContent = totalDone;
  document.getElementById('cnt-inc').textContent = totalInc;
  const pct = Math.round((totalDone / total) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = pct + '% Complete';

  sections.forEach(sec => {
    const group = document.createElement('div');
    group.className = 'section-group';
    group.dataset.section = sec.title;

    const secDone = sec.promises.filter(p => p[2]).length;
    const secTotal = sec.promises.length;

    const titleEl = document.createElement('div');
    titleEl.className = 'section-title';
    titleEl.innerHTML = `${sec.title} <span class="sec-counts">${secDone}/${secTotal} done</span>`;
    group.appendChild(titleEl);

    const grid = document.createElement('div');
    grid.className = 'promises-grid';

    sec.promises.forEach(p => {
      const [num, text, done] = p;
      const card = document.createElement('div');
      card.className = 'promise-card ' + (done ? 'done' : 'incomplete');
      card.dataset.num = num;
      card.dataset.text = text.toLowerCase();
      card.dataset.status = done ? 'done' : 'incomplete';

      card.innerHTML = `
        <span class="promise-num">#${num}</span>
        <div>
          <div class="promise-text">${text}</div>
          <span class="promise-badge ${done ? 'badge-done' : 'badge-inc'}">${done ? '✓ Complete' : '✗ Incomplete'}</span>
        </div>`;
      grid.appendChild(card);
    });

    group.appendChild(grid);
    container.appendChild(group);
  });

  applyFilters();
}

function applyFilters() {
  const query = currentSearch.toLowerCase();
  let visible = 0;

  document.querySelectorAll('.section-group').forEach(grp => {
    let secVisible = 0;
    grp.querySelectorAll('.promise-card').forEach(card => {
      const statusMatch = currentFilter === 'all' || card.dataset.status === currentFilter;
      const textMatch = !query || card.dataset.text.includes(query) || card.dataset.num === query;
      const show = statusMatch && textMatch;
      card.classList.toggle('hidden', !show);
      if (show) { secVisible++; visible++; }
    });
    grp.classList.toggle('hidden', secVisible === 0);
  });

  const total = document.querySelectorAll('.promise-card:not(.hidden)').length;
  const rc = document.getElementById('results-count');
  if (query || currentFilter !== 'all') {
    rc.textContent = `Showing ${total} promise${total !== 1 ? 's' : ''}`;
  } else {
    rc.textContent = '';
  }
}

function filterAll(el) {
  currentFilter = 'all';
  document.getElementById('btn-all').className = 'filter-btn active-all';
  document.getElementById('btn-done').className = 'filter-btn';
  document.getElementById('btn-inc').className = 'filter-btn';
  applyFilters();
}
function filterDone(el) {
  currentFilter = 'done';
  document.getElementById('btn-all').className = 'filter-btn';
  document.getElementById('btn-done').className = 'filter-btn active-done';
  document.getElementById('btn-inc').className = 'filter-btn';
  applyFilters();
}
function filterInc(el) {
  currentFilter = 'incomplete';
  document.getElementById('btn-all').className = 'filter-btn';
  document.getElementById('btn-done').className = 'filter-btn';
  document.getElementById('btn-inc').className = 'filter-btn active-inc';
  applyFilters();
}
function doSearch(val) {
  currentSearch = val;
  applyFilters();
}

buildPage();
</script>
